<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>No Civ, Just Deer</title>
<link rel="icon" type="image/png" href="assets/logo.png"/>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;font-family:ui-rounded,'Segoe UI',system-ui,sans-serif;}
  html,body{margin:0;height:100%;overflow:hidden;background:#8fae5b;}
  canvas{display:block;position:fixed;inset:0;}
  .hud{position:fixed;top:10px;left:10px;display:flex;gap:12px;background:rgba(255,253,246,.93);padding:7px 13px;border-radius:14px;box-shadow:0 3px 12px rgba(80,70,40,.25);font-weight:800;color:#5c4f3a;font-size:15px;z-index:3;align-items:center;}
  .hud img{width:19px;height:19px;vertical-align:-4px;}
  .hud .ver{font-size:11px;color:#6d5d40;background:#efe7d4;border-radius:999px;padding:1px 8px;}
  .tip{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(255,253,246,.96);padding:9px 18px;border-radius:999px;box-shadow:0 3px 12px rgba(80,70,40,.22);font-weight:700;color:#5c4f3a;font-size:14px;z-index:3;text-align:center;max-width:92%;}
  .warn{position:fixed;top:58px;left:50%;transform:translateX(-50%);background:#b5484a;color:#fff;font-weight:800;padding:8px 18px;border-radius:12px;z-index:5;opacity:0;transition:opacity .3s;font-size:14px;pointer-events:none;}
  #build{position:fixed;right:12px;bottom:16px;border:0;border-radius:12px;color:#fff;font-weight:800;font-size:15px;padding:12px 16px;background:#9f6018;box-shadow:0 3px 10px rgba(80,60,40,.3);z-index:3;}
  #btray{display:none;position:fixed;left:0;right:0;bottom:0;background:rgba(255,251,240,.98);padding:9px 8px;overflow-x:auto;white-space:nowrap;box-shadow:0 -3px 14px rgba(80,70,40,.22);z-index:4;text-align:center;}
  .tb{display:inline-block;margin:2px 4px;padding:7px 10px;border:2px solid #e5dcc4;border-radius:12px;background:#f5efe0;font-size:12px;font-weight:800;color:#5c4f3a;min-width:78px;line-height:1.3;vertical-align:top;}
  .tb small{display:block;font-weight:600;color:#6d5d40;font-size:9px;margin-top:2px;}
  #panel{display:none;position:fixed;inset:0;place-items:center;background:rgba(40,34,26,.55);z-index:6;}
  #panel .card{background:#fffdf6;border-radius:16px;padding:16px;width:min(340px,90vw);box-shadow:0 12px 44px rgba(0,0,0,.4);}
  #panel h3{margin:0 0 2px;color:#5c4f3a;font-size:18px;}
  #panel .sub{color:#6d5d40;font-size:12px;margin-bottom:10px;}
  .upg{width:100%;border:0;border-radius:11px;color:#fff;font-weight:800;font-size:14px;padding:11px;margin-top:8px;text-align:left;}
  #setup{position:fixed;inset:0;display:grid;place-items:center;background:linear-gradient(160deg,#a7c46b,#7a9a4c);z-index:8;}
  #setup .card{background:#fffdf6;border-radius:20px;padding:22px;width:min(380px,92vw);text-align:center;box-shadow:0 16px 50px rgba(0,0,0,.35);}
  #setup h1{font-size:24px;color:#4a3d29;margin:.2em 0;}
  #setup p{color:#6d5d40;font-size:14px;line-height:1.5;}
  #setup button{margin-top:14px;width:100%;border:0;border-radius:12px;background:#7b5bd6;color:#fff;font-size:16px;font-weight:800;padding:13px;box-shadow:0 3px 12px rgba(80,60,140,.35);}
  #setup .ver{font-size:11px;color:#6d5d40;background:#efe7d4;border-radius:999px;padding:1px 8px;display:inline-block;margin-top:4px;}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="hud">
  <span><img src="assets/resources/wood.png" alt="wood"><b id="rWood">0</b></span>
  <span><img src="assets/resources/stone.png" alt="rocks"><b id="rRock">0</b></span>
  <span><img src="assets/resources/lumber.png" alt="2x4s"><b id="rPlank">0</b></span>
  <span><img src="assets/resources/bricks.png" alt="bricks"><b id="rBrick">0</b></span>
  <span class="ver" id="ver"></span>
</div>
<div class="warn" id="warn"></div>
<button id="build">🔨 Build</button>
<div id="btray"></div>
<div id="panel"><div class="card" id="panelCard"></div></div>
<div class="tip" id="tip"></div>
<div id="setup"><div class="card">
  <img src="assets/logo.png" alt="No Civ, Just Deer" style="max-width:88%;max-height:130px;display:block;margin:0 auto" onerror="this.style.display='none';document.getElementById('t2').style.display='block';"/>
  <h1 id="t2" style="display:none">🦌 No Civ, Just Deer</h1>
  <p>Fed up with the humans, a few deer slip into the woods to build a colony of their own — hidden, cozy, and free.</p>
  <p><b>First, choose a spot for your Deer Lodge</b> — the heart of the colony.</p>
  <p style="margin-bottom:4px"><b>Forest size</b></p>
  <div id="sizePick" style="display:flex;gap:6px;justify-content:center;margin-bottom:4px"></div>
  <span class="ver" id="ver2"></span>
  <button id="beginBtn">Enter the forest →</button>
</div></div>
<script>
(() => {
  const BUILD_VERSION = "v1.4.0-roles";
  const cv=document.getElementById('stage'),ctx=cv.getContext('2d');
  let W=0,H=0,DPR=1,panX=0,panY=0,zoom=1.0;
  const TW=64,TH=32;let GW=20,GH=20;
  const iso=(gx,gy)=>({x:(gx-gy)*TW/2,y:(gx+gy)*TH/2});
  const W2S=(wx,wy)=>({x:wx*zoom+panX,y:wy*zoom+panY});
  const S2W=(sx,sy)=>({x:(sx-panX)/zoom,y:(sy-panY)/zoom});
  const unIso=(wx,wy)=>({gx:(wx/(TW/2)+wy/(TH/2))/2,gy:(wy/(TH/2)-wx/(TW/2))/2});
  const rand=(a,b)=>a+Math.random()*(b-a),clamp=(v,a,b)=>v<a?a:v>b?b:v;
  const $=id=>document.getElementById(id);
  function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
  addEventListener('resize',resize);resize();

  // ---- assets ----
  const DWALK={R:[],L:[]},DGROUND=228/256;
  ['R','L'].forEach(s=>{for(let i=0;i<6;i++){const im=new Image();im.src='assets/deer/walk/'+s+i+'.png';DWALK[s][i]=im;}});
  const BIMG={};
  const BSRC={lodge:'townhall',woodcutter:'deerhouse',mine:'mine',sawmill:'lumber',kiln:'mason',wh_wood:'warehouse',wh_rocks:'warehouse',wh_planks:'warehouse',wh_bricks:'warehouse'};
  Object.values(BSRC).forEach(n=>{if(!BIMG[n]){const im=new Image();im.src='assets/buildings/'+n+'.png';BIMG[n]=im;}});
  const TIMG={};
  ['grass','darkgrass','water'].forEach(n=>{const im=new Image();im.src='assets/terrain/'+n+'.png';TIMG[n]=im;});

  // ---- economy / tuning (PHASE1_FEEL_LOCKED) ----
  const RES={wood:0,rocks:0,planks:0,bricks:0};
  const STARTER_WOOD=16, BATCH=4, NEAR_COUNT=5, MAX_SLOTS=2, SHIFT_LEN=4, REST_TIME=6;
  const BASE_SPEED=105, SPEED_STEP=22;
  const BUILD_COST={woodcutter:{wood:16},mine:{wood:44},sawmill:{wood:60,rocks:36},kiln:{planks:36,rocks:48}};
  const AUTO_COST={woodcutter:{rocks:56},mine:{planks:56},sawmill:{bricks:40},kiln:{bricks:70}};
  const SLOT_COST={woodcutter:{wood:30},mine:{rocks:40},sawmill:{rocks:40},kiln:{rocks:50}};
  const PROC_TIME=3.2;   // base seconds per processing cycle (shortened by worker speed)
  const RES_ICON={wood:'🪵',rocks:'🪨',planks:'🟫',bricks:'🧱'};
  // storage: small built-in cap (Lodge/ground) so you can start; warehouses add big capacity
  const BASE_CAP={wood:90,rocks:90,planks:60,bricks:60};
  const WH_CAP=520;                     // per-warehouse capacity — large, a comfort ceiling
  const WH_BASE={wh_wood:{rocks:24},wh_rocks:{wood:30},wh_planks:{rocks:60},wh_bricks:{planks:44}};
  const WH_GROWTH=1.6;                  // each warehouse of a resource costs more than the last
  const STRUCT_META={
    lodge:{name:'Deer Lodge',need:null,gathers:null,tier:1},
    woodcutter:{name:"Woodcutter's Hut",need:'tree',gathers:'wood',tier:1},
    mine:{name:'Mine',need:'rock',gathers:'rocks',tier:1},
    sawmill:{name:'Sawmill',need:null,gathers:null,process:['wood','planks'],tier:2},
    kiln:{name:'Kiln',need:null,gathers:null,process:['rocks','bricks'],tier:3},
    wh_wood:{name:'Wood Depot',need:null,gathers:null,stores:'wood',tier:1},
    wh_rocks:{name:'Rock Depot',need:null,gathers:null,stores:'rocks',tier:1},
    wh_planks:{name:'2×4 Depot',need:null,gathers:null,stores:'planks',tier:2},
    wh_bricks:{name:'Brick Depot',need:null,gathers:null,stores:'bricks',tier:2},
  };
  const buildTimeOf=t=>3+(STRUCT_META[t].tier||1)*2.6;   // higher-tier builds take longer

  // ---- world ----
  let trees=[],rocks=[],water=new Set(),structs=[],sites=[],started=false;
  function lodge(){return structs.find(s=>s.type==='lodge');}
  function builder(){const l=lodge();return l&&l.crew[0];}
  // ---- storage / logistics ----
  function capOf(res){let c=BASE_CAP[res]||0;for(const s of structs)if(s.stores===res)c+=WH_CAP;return c;}
  function whCount(type){return structs.filter(s=>s.type===type).length+sites.filter(s=>s.type===type).length;}
  function whCost(type){const base=WH_BASE[type],n=whCount(type),o={};for(const k in base)o[k]=Math.round(base[k]*Math.pow(WH_GROWTH,n));return o;}
  function costOf(type){return WH_BASE[type]?whCost(type):BUILD_COST[type];}
  function depotFor(res,fx,fy){let best=null,bd=1e9;for(const s of structs)if(s.stores===res){const d=Math.hypot(s.gx-fx,s.gy-fy);if(d<bd){bd=d;best=s;}}return best;}
  function bank(res,amt){RES[res]=Math.min(capOf(res),RES[res]+amt);}   // clamp at cap (pause-on-full)
  function storageFull(res){return RES[res]>=capOf(res);}
  function isWater(gx,gy){return water.has(Math.round(gx)+'_'+Math.round(gy));}
  function genWorld(){
    trees=[];rocks=[];water=new Set();structs=[];
    const px=rand(12,16)|0,py=rand(3,7)|0;
    for(let i=-2;i<=2;i++)for(let j=-1;j<=1;j++){if(Math.hypot(i,j*1.6)<2.4)water.add((px+i)+'_'+(py+j));}
    for(let c=0;c<4;c++){const cx=rand(2,GW-3),cy=rand(2,GH-3);for(let k=0;k<rand(6,11);k++){const gx=clamp(cx+rand(-2.2,2.2),.5,GW-1.5),gy=clamp(cy+rand(-2.2,2.2),.5,GH-1.5);if(!isWater(gx,gy))trees.push({gx,gy,tone:rand(-8,10)});}}
    for(let k=0;k<10;k++){const gx=rand(1,GW-1),gy=rand(1,GH-1);if(!isWater(gx,gy))trees.push({gx,gy,tone:rand(-8,10)});}
    for(let c=0;c<2;c++){const cx=rand(3,GW-3),cy=rand(3,GH-3);for(let k=0;k<rand(4,7);k++){const gx=clamp(cx+rand(-1.8,1.8),.5,GW-1.5),gy=clamp(cy+rand(-1.8,1.8),.5,GH-1.5);if(!isWater(gx,gy))rocks.push({gx,gy});}}
  }

  // ---- deer / crew ----
  function mkDeer(gx,gy){return {gx,gy,face:1,dist:0,sdist:0,bob:rand(0,6.28),trip:null,home:null,speedLvl:0,logiLvl:0,buildLvl:0,shiftTrips:0,resting:false,restT:0};}
  function addWorker(st){const d=mkDeer(st.gx+rand(-.5,.5),st.gy+.6);d.home=st;st.crew.push(d);return d;}
  function allDeer(){return structs.reduce((a,s)=>s.crew?a.concat(s.crew):a,[]);}
  function nextSpeedDeer(st){return st.crew.find(d=>d.speedLvl<5);}
  function speedOf(d){return BASE_SPEED+SPEED_STEP*(d.speedLvl||0);}
  function speedCost(d){const crew=d.home?d.home.crew:[d];const idx=Math.max(0,crew.indexOf(d));return (8+idx*30)+(d.speedLvl||0)*(6+idx*3);}
  function builderCost(kind,lvl){return kind==='logi'?{wood:22+lvl*16}:{rocks:24+lvl*16};}   // logistics vs build speed
  function nodesFor(st){return st.gathers==='wood'?trees:rocks;}
  function dispatch(st,deer){
    if(!deer||deer.trip)return false;
    if(deer.resting){warn('That deer is on break (labor laws) — '+Math.ceil(deer.restT)+'s');return false;}
    if(st.process){
      const inp=st.process[0],out=st.process[1];
      if(storageFull(out)){warn(RES_ICON[out]+' storage full — build a '+STRUCT_META['wh_'+out].name);return false;}
      if(RES[inp]<BATCH){warn(STRUCT_META[st.type].name+' needs '+BATCH+' '+RES_ICON[inp]+' in store');return false;}
      RES[inp]-=BATCH;
      deer.trip={kind:'process',st,t:0,dur:PROC_TIME*(BASE_SPEED/speedOf(deer))};
      return true;
    }
    if(storageFull(st.gathers)){warn(RES_ICON[st.gathers]+' storage full — build a '+STRUCT_META['wh_'+st.gathers].name);return false;}
    const src=nodesFor(st);if(!src)return false;
    const near=src.map(o=>({o,d:Math.hypot(o.gx-st.gx,o.gy-st.gy)})).sort((a,b)=>a.d-b.d).slice(0,NEAR_COUNT).map(x=>x.o);
    if(!near.length){warn('No '+(st.gathers==='wood'?'trees':'rocks')+' nearby');return false;}
    let pool=near;if(near.length>1&&st._last)pool=near.filter(o=>o!==st._last);
    const node=pool[Math.floor(Math.random()*pool.length)];st._last=node;
    deer.trip={kind:'gather',st,node,phase:'out',t:0};return true;
  }
  function dispatchAll(st){let any=false;for(const d of st.crew)if(!d.trip&&!d.resting&&dispatch(st,d))any=true;return any;}

  const parts=[];function pop(x,y,t){parts.push({x,y,vy:-0.9,life:1,t});}
  let warnT=0;function warn(t){$('warn').textContent=t;$('warn').style.opacity=1;warnT=2.6;}
  function tip(t){$('tip').textContent=t;$('tip').style.opacity=t?1:0;}

  function stepDeer(deer,dt){
    if(!deer)return;
    if(deer.resting){deer.restT-=dt;if(deer.restT<=0){deer.resting=false;deer.shiftTrips=0;}}
    function endShift(){deer.shiftTrips=(deer.shiftTrips||0)+1;if(deer.role!=='builder'&&deer.shiftTrips>=SHIFT_LEN){deer.resting=true;deer.restT=REST_TIME;}}
    const tr=deer.trip;let moving=false;
    if(tr){
      const sp=speedOf(deer);
      if(tr.kind==='process'){
        tr.t+=dt;
        if(tr.t>=tr.dur){const out=tr.st.process[1];bank(out,BATCH);const s=W2S(iso(tr.st.gx,tr.st.gy).x,iso(tr.st.gx,tr.st.gy).y-40);for(let k=0;k<BATCH;k++)pop(s.x+rand(-10,10),s.y+rand(-6,4),out);deer.trip=null;endShift();if(tr.st.auto)tr.st.autoPause=0.5;}
      } else if(tr.kind==='build'){
        const site=tr.site,logi=BASE_SPEED+SPEED_STEP*(deer.logiLvl||0);
        if(tr.phase==='toDepot'||tr.phase==='carry'){
          const g=tr.phase==='toDepot'?(tr.src||lodge()):site,tx=g.gx,ty=g.gy+.6,dx=tx-deer.gx,dy=ty-deer.gy,dl=Math.hypot(dx,dy);
          if(dl>0.14){const dxn=dx/dl,dyn=dy/dl;const lspt=Math.hypot((dxn-dyn)*TW/2,(dxn+dyn)*TH/2)||1;const step=Math.min(dl,logi*dt/lspt);deer.gx+=dxn*step;deer.gy+=dyn*step;deer.sdist=(deer.sdist||0)+step*lspt;moving=true;deer.face=(dxn-dyn>0)?1:-1;}
          else tr.phase=tr.phase==='toDepot'?'carry':'build';
        } else {
          const rate=1+0.45*(deer.buildLvl||0);   // build-speed upgrade
          site.prog=Math.min(1,site.prog+dt/site.buildTime*rate);
          if(Math.random()<dt*4){const s=W2S(iso(site.gx,site.gy).x,iso(site.gx,site.gy).y-18);pop(s.x+rand(-9,9),s.y,tr.mat||'wood');}
          if(site.prog>=1){const idx=sites.indexOf(site);if(idx>=0)sites.splice(idx,1);completeStruct(site.type,site.gx,site.gy);deer.trip=null;}
        }
      } else {
        if(tr.phase==='gather'){tr.t+=dt;if(tr.t>0.7){tr.phase='back';tr.depot=depotFor(tr.st.gathers,tr.st.gx,tr.st.gy)||tr.st;}}
        else{
          const dep=tr.depot||tr.st;
          const tx=(tr.phase==='out')?tr.node.gx:dep.gx;
          const ty=(tr.phase==='out')?tr.node.gy:dep.gy+.6;
          const dx=tx-deer.gx,dy=ty-deer.gy,dl=Math.hypot(dx,dy);
          if(dl>0.08){const dxn=dx/dl,dyn=dy/dl;const lspt=Math.hypot((dxn-dyn)*TW/2,(dxn+dyn)*TH/2)||1;const step=Math.min(dl,sp*dt/lspt);deer.gx+=dxn*step;deer.gy+=dyn*step;deer.dist+=step;deer.sdist=(deer.sdist||0)+step*lspt;moving=true;deer.face=(dxn-dyn>0)?1:-1;}
          else if(tr.phase==='out'){tr.phase='gather';tr.t=0;const s=W2S(iso(deer.gx,deer.gy).x,iso(deer.gx,deer.gy).y-28);pop(s.x,s.y,tr.st.gathers);}
          else{bank(tr.st.gathers,BATCH);const s=W2S(iso(dep.gx,dep.gy).x,iso(dep.gx,dep.gy).y-40);for(let k=0;k<BATCH;k++)pop(s.x+rand(-10,10),s.y+rand(-6,4),tr.st.gathers);deer.trip=null;endShift();if(tr.st.auto)tr.st.autoPause=0.5;}
        }
      }
    } else {
      const h=deer.home;if(h){const tx=h.gx,ty=h.gy+.6,dx=tx-deer.gx,dy=ty-deer.gy,dl=Math.hypot(dx,dy);
        if(dl>0.15){const dxn=dx/dl,dyn=dy/dl;const lspt=Math.hypot((dxn-dyn)*TW/2,(dxn+dyn)*TH/2)||1;const step=Math.min(dl,48*dt/lspt);deer.gx+=dxn*step;deer.gy+=dyn*step;deer.sdist=(deer.sdist||0)+step*lspt;moving=true;deer.face=(dxn-dyn>0)?1:-1;}}
    }
    deer.bob+=dt*(moving?4:1.4);
    if(deer.role==='builder'&&!deer.trip&&!deer.resting){const site=sites.find(s=>!s.claimed);
      if(site){site.claimed=true;const cost=costOf(site.type)||{},mats=Object.keys(cost),mat=mats[0]||null,src=(mat&&depotFor(mat,site.gx,site.gy))||lodge();deer.trip={kind:'build',site,phase:'toDepot',src,mat};}}
    if(deer.home&&deer.home.auto&&!deer.trip&&!deer.resting&&deer.role!=='builder'){const h=deer.home,outRes=h.process?h.process[1]:h.gathers;if(!storageFull(outRes)){h.autoPause=(h.autoPause||0)-dt;if(h.autoPause<=0)dispatch(h,deer);}}
  }

  // ---- rendering ----
  function drawTile(gx,gy){const p=iso(gx,gy),c=W2S(p.x,p.y);if(c.x<-TW*zoom||c.x>W+TW*zoom||c.y<-TH*zoom||c.y>H+TH*zoom)return;
    const im=isWater(gx,gy)?TIMG.water:(((gx+gy)&1)?TIMG.darkgrass:TIMG.grass);
    if(im&&im.complete&&im.naturalHeight){const dw=(TW+2)*zoom,dh=dw*im.naturalHeight/im.naturalWidth;ctx.drawImage(im,c.x-dw/2,c.y-dh+TH/2*zoom,dw,dh);}
    else{ctx.fillStyle=isWater(gx,gy)?'#5aa6e0':(((gx+gy)&1)?'#84a750':'#8caf56');ctx.beginPath();ctx.moveTo(c.x,c.y-TH/2*zoom);ctx.lineTo(c.x+TW/2*zoom,c.y);ctx.lineTo(c.x,c.y+TH/2*zoom);ctx.lineTo(c.x-TW/2*zoom,c.y);ctx.closePath();ctx.fill();}
  }
  function drawTree(t){const p=iso(t.gx,t.gy),c=W2S(p.x,p.y),z=zoom;ctx.fillStyle='rgba(40,55,25,.22)';ctx.beginPath();ctx.ellipse(c.x,c.y,10*z,4.5*z,0,0,6.28);ctx.fill();ctx.fillStyle='#6b4a2a';ctx.fillRect(c.x-2.4*z,c.y-16*z,4.8*z,16*z);ctx.fillStyle='hsl('+(110+t.tone)+',42%,38%)';ctx.beginPath();ctx.arc(c.x,c.y-24*z,15*z,0,6.28);ctx.fill();ctx.fillStyle='hsl('+(110+t.tone)+',44%,46%)';ctx.beginPath();ctx.arc(c.x-6*z,c.y-20*z,9*z,0,6.28);ctx.arc(c.x+7*z,c.y-22*z,8*z,0,6.28);ctx.fill();}
  function drawRock(r){const p=iso(r.gx,r.gy),c=W2S(p.x,p.y),z=zoom;ctx.fillStyle='rgba(40,55,25,.2)';ctx.beginPath();ctx.ellipse(c.x,c.y,11*z,5*z,0,0,6.28);ctx.fill();ctx.fillStyle='#9aa0a6';ctx.beginPath();ctx.moveTo(c.x-10*z,c.y);ctx.lineTo(c.x-4*z,c.y-12*z);ctx.lineTo(c.x+6*z,c.y-13*z);ctx.lineTo(c.x+11*z,c.y-2*z);ctx.closePath();ctx.fill();ctx.fillStyle='#b6bcc2';ctx.beginPath();ctx.moveTo(c.x-4*z,c.y-12*z);ctx.lineTo(c.x+6*z,c.y-13*z);ctx.lineTo(c.x+2*z,c.y-4*z);ctx.closePath();ctx.fill();}

  // ---- modular deer: base frame + role tint + role tool ----
  const ROLE_VIS={

  const tintCache={};

    else if(kind==='pick'){ctx.strokeStyle='#6b4a2a';ctx.lineWidth=2.2*z;ctx.beginPath();ctx.moveTo(0,6*z);ctx.lineTo(2*z,-8*z);ctx.stroke();ctx.strokeStyle='#b9bec4';ctx.lineWidth=2.4*z;ctx.beginPath();ctx.moveTo(-6*z,-10*z);ctx.quadraticCurveTo(2*z,-13*z,10*z,-8*z);ctx.stroke();}

  function drawDeer(deer){const p=iso(deer.gx,deer.gy),c=W2S(p.x,p.y),z=zoom;

  function render(){

    const ents=[];
    for(const t of trees)ents.push({d:t.gx+t.gy,f:()=>drawTree(t)});
    for(const r of rocks)ents.push({d:r.gx+r.gy-.05,f:()=>drawRock(r)});
    for(const st of structs)ents.push({d:st.gx+st.gy,f:()=>drawStruct(st)});
    for(const si of sites)ents.push({d:si.gx+si.gy,f:()=>drawSite(si)});
    for(const d of allDeer())ents.push({d:d.gx+d.gy+.02,f:()=>drawDeer(d)});

  }

  // ---- build / placement ----
  let placing=null;
  function hoverTile(){const w=S2W(ptr.x,ptr.y),g=unIso(w.x,w.y),gx=Math.round(g.gx),gy=Math.round(g.gy);if(gx<0||gy<0||gx>=GW||gy>=GH)return null;return {gx,gy};}
  function nearResource(kind,gx,gy){const src=kind==='tree'?trees:rocks;return src.some(o=>Math.hypot(o.gx-gx,o.gy-gy)<=NEAR_COUNT-1.5);}
  function canPlace(type,gx,gy){
    if(isWater(gx,gy))return false;
    if(structs.some(s=>Math.round(s.gx)===gx&&Math.round(s.gy)===gy))return false;
    if(sites.some(s=>Math.round(s.gx)===gx&&Math.round(s.gy)===gy))return false;
    if(trees.some(t=>Math.round(t.gx)===gx&&Math.round(t.gy)===gy))return false;

    return true;
  }
  function afford(type){const c=costOf(type);return !c||Object.keys(c).every(k=>RES[k]>=c[k]);}
  function completeStruct(type,gx,gy){
    const meta=STRUCT_META[type];
    const st={type,gx,gy,crew:[],auto:false,autoPause:0,gathers:meta.gathers||null,process:meta.process||null,stores:meta.stores||null,_last:null};
    structs.push(st);

    const s=W2S(iso(gx,gy).x,iso(gx,gy).y-16);for(let k=0;k<7;k++)pop(s.x+rand(-14,14),s.y+rand(-6,4),'wood');

    else if(type==='mine')tip('Tap the Mine for rocks. You can automate the Woodcutter now (long-press it).');
    else if(type==='sawmill')tip('The Sawmill turns 🪵 into 🟫 2×4s — tap it (needs wood in store).');
    else if(type==='kiln')tip('The Kiln turns 🪨 into 🧱 bricks — tap it (needs rocks in store).');
    else if(st.stores)tip(meta.name+' raises your '+RES_ICON[st.stores]+' capacity. Gatherers deliver there, and Builders pull build materials from it.');
    return st;
  }
  function doPlace(type,gx,gy){

      structs.push(st);

  const BUILDABLE=['woodcutter','mine','sawmill','kiln','wh_wood','wh_rocks','wh_planks','wh_bricks'];

  // ---- upgrade panel ----

    if(bl<5){const c=builderCost('build',bl);h+='<button class="upg" style="background:#a8631a" data-a="bld">🔨 Build speed ('+bl+'/5) — '+c.rocks+RES_ICON.rocks+'<small style="display:block;font-weight:600;opacity:.85">how fast a structure is raised once materials arrive</small></button>';}

  function openPanel(st){

    h+='<button class="upg" style="background:#b5484a;margin-top:12px" data-a="close">Close</button>';
    $('panelCard').innerHTML=h;$('panel').style.display='grid';
    $('panelCard').querySelectorAll('[data-a]').forEach(b=>b.onclick=()=>{const a=b.dataset.a;
      if(a==='close'){$('panel').style.display='none';return;}
      if(a==='speed'){const nd=nextSpeedDeer(st);if(!nd)return;const c=speedCost(nd);if(RES.wood<c){warn('Need '+c+RES_ICON.wood);return;}RES.wood-=c;nd.speedLvl++;}

  // ---- input ----
  let ptr={x:0,y:0},downPt=null,moved=0,panStart=null,lpT=null;

  cv.addEventListener('pointerdown',e=>{const p=P(e);ptr=p;downPt=p;moved=0;panStart={x:panX,y:panY};clearTimeout(lpT);lpT=setTimeout(()=>{if(moved<10&&!placing){const hit=structAt(ptr.x,ptr.y);if(hit&&(hit.gathers||hit.process||hit.type==='lodge'))openPanel(hit);}},520);});

  addEventListener('pointerup',e=>{clearTimeout(lpT);if(!downPt)return;const wasTap=moved<8;downPt=null;if(!wasTap||!started)return;

    const hit=structAt(ptr.x,ptr.y);

  $('panel').addEventListener('pointerdown',e=>{if(e.target===$('panel'))$('panel').style.display='none';});
  cv.addEventListener('contextmenu',e=>{e.preventDefault();const hit=structAt(ptr.x,ptr.y);if(hit&&(hit.gathers||hit.process||hit.type==='lodge'))openPanel(hit);});
  addEventListener('keydown',e=>{if(e.key==='Escape'){if(placing&&placing!=='lodge'){placing=null;$('build').textContent='🔨 Build';$('btray').style.display='none';tip('');}else if($('panel').style.display==='grid'){$('panel').style.display='none';}}});
  addEventListener('wheel',e=>{const f=e.deltaY<0?1.1:1/1.1;const nz=clamp(zoom*f,0.6,1.8);panX=ptr.x-(ptr.x-panX)*(nz/zoom);panY=ptr.y-(ptr.y-panY)*(nz/zoom);zoom=nz;},{passive:true});

  function centerOn(gx,gy){const p=iso(gx,gy);panX=W/2-p.x*zoom;panY=H*0.5-p.y*zoom;}

  // ---- loop ----
  let last=performance.now();
  function loop(now){const dt=Math.min(0.05,(now-last)/1000);last=now;
    if(started){for(const d of allDeer())stepDeer(d,dt);}
    for(let i=parts.length-1;i>=0;i--){const pt=parts[i];pt.y+=pt.vy;pt.vy+=0.02;pt.life-=dt*1.1;if(pt.life<=0)parts.splice(i,1);}
    if(warnT>0){warnT-=dt;if(warnT<=0)$('warn').style.opacity=0;}
    render();
    $('rWood').textContent=Math.floor(RES.wood);$('rRock').textContent=Math.floor(RES.rocks);$('rPlank').textContent=Math.floor(RES.planks);$('rBrick').textContent=Math.floor(RES.bricks);
    $('ver').textContent=BUILD_VERSION;
    requestAnimationFrame(loop);
  }

  const SIZES=[{n:'Cozy',v:16},{n:'Standard',v:22},{n:'Sprawling',v:30}];let chosenSize=16;
  function renderSizePick(){$('sizePick').innerHTML=SIZES.map(s=>'<button class="tb" data-v="'+s.v+'" style="min-width:0;margin:0;'+(s.v===chosenSize?'border-color:#7b5bd6;background:#efeafc':'')+'">'+s.n+'<small>'+s.v+'×'+s.v+'</small></button>').join('');
    $('sizePick').querySelectorAll('[data-v]').forEach(b=>b.onclick=()=>{chosenSize=+b.dataset.v;GW=GH=chosenSize;genWorld();centerOn(GW/2,GH/2);renderSizePick();});}
  renderSizePick();
  $('beginBtn').onclick=()=>{$('setup').style.display='none';placing='lodge';started=true;tip('Tap a cozy spot to place your Deer Lodge.');};
  genWorld();RES.wood=STARTER_WOOD;centerOn(GW/2,GH/2);
  $('ver2').textContent=BUILD_VERSION;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
